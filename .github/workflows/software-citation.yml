name: Software citation

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    branches: [master]
    types:
      - completed

permissions:
  contents: write

jobs:
  update:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && contains(github.event.workflow_run.head_commit.message, '[release]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      - id: citation
        uses: ./
      - name: Commit citation updates
        if: steps.citation.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff README.md
          git commit -m "docs: update software citation metadata"
          git push
